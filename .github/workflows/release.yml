name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact: toji-linux-x86_64
          - runner: ubuntu-24.04-arm
            artifact: toji-linux-aarch64
          # Apple Silicon tracks latest; Intel pinned (no macos-intel-latest)
          - runner: macos-latest
            artifact: toji-macos-aarch64
          - runner: macos-15-intel
            artifact: toji-macos-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install libcurl (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libidn2-dev

      - name: Determine version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Build release binary
        working-directory: native
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Always perl -pi for reliable cross-platform (macOS + Linux) version bump from tag
          perl -pi -e "s/0\.[0-9]+\.[0-9]+/$VERSION/g" src/main/scala/io/toji/Main.scala
          sbt "set version := \"$VERSION\"; test; nativeLink"

      - name: Package binary
        working-directory: native/target/scala-3.4.0
        run: |
          cp toji ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: native/target/scala-3.4.0/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Stage release files
        run: cp scripts/install.sh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - name: Verify all release assets exist and download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          required=(install.sh toji-linux-x86_64 toji-linux-aarch64 toji-macos-aarch64 toji-macos-x86_64)
          json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}")"
          for name in "${required[@]}"; do
            id="$(printf '%s' "$json" | jq -r --arg n "$name" '.assets[] | select(.name==$n) | .id')"
            size="$(printf '%s' "$json" | jq -r --arg n "$name" '.assets[] | select(.name==$n) | .size')"
            if [[ -z "$id" || "$id" == "null" ]]; then
              echo "missing asset: $name"
              exit 1
            fi
            if [[ "$name" != "install.sh" && "$size" -lt 1000000 ]]; then
              echo "asset too small: $name ($size bytes)"
              exit 1
            fi
            if [[ "$name" != "install.sh" ]]; then
              curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/octet-stream" \
                -o "/tmp/${name}" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${id}"
              chmod +x "/tmp/${name}"
              if [[ "$name" == *"linux-x86_64"* ]]; then
                "/tmp/${name}" --version
              fi
            fi
            echo "ok: $name ($size bytes)"
          done
